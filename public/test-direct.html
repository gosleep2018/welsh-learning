<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🧪 直接测试页面</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, sans-serif;
            background: #1a1a2e;
            color: white;
            padding: 40px 20px;
            text-align: center;
            min-height: 100vh;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
        }
        .test-badge {
            background: #ff6b6b;
            color: white;
            padding: 12px 24px;
            border-radius: 20px;
            display: inline-block;
            margin-bottom: 30px;
            font-weight: bold;
            box-shadow: 0 4px 12px rgba(255,107,107,0.3);
        }
        h1 {
            color: #4ecdc4;
            margin-bottom: 20px;
            font-size: 2rem;
        }
        .test-box {
            background: rgba(255,255,255,0.1);
            border-radius: 15px;
            padding: 30px;
            margin: 20px 0;
            border: 2px solid rgba(255,107,107,0.3);
        }
        .test-button {
            background: #4ecdc4;
            color: white;
            border: none;
            padding: 20px;
            font-size: 1.2rem;
            border-radius: 12px;
            cursor: pointer;
            margin: 10px;
            width: 100%;
            min-height: 60px;
            transition: all 0.2s;
        }
        .test-button:active {
            background: #3db8af;
            transform: scale(0.98);
        }
        .test-button.primary {
            background: #ff6b6b;
        }
        .test-button.primary:active {
            background: #e55a5a;
        }
        .status-box {
            margin-top: 30px;
            padding: 20px;
            background: rgba(0,0,0,0.3);
            border-radius: 10px;
            text-align: left;
            font-family: monospace;
            font-size: 14px;
        }
        .success { color: #4ecdc4; }
        .error { color: #ff6b6b; }
    </style>
</head>
<body>
    <div class="container">
        <div class="test-badge">
            🧪 直接测试页面
        </div>
        
        <h1>直接测试页面</h1>
        <p style="margin-bottom: 30px; color: rgba(255,255,255,0.8);">
            这个页面直接从public目录部署，应该能正常访问。
        </p>
        
        <div class="test-box">
            <h2>📱 功能测试</h2>
            
            <button class="test-button" id="jsTestBtn">
                ✅ 测试JavaScript
            </button>
            
            <button class="test-button primary" id="audioTestBtn">
                🔊 测试音频播放
            </button>
            
            <button class="test-button" id="touchTestBtn">
                👆 测试触摸事件
            </button>
        </div>
        
        <div class="status-box" id="status">
            <div style="color: #4ecdc4; margin-bottom: 10px;">📊 测试状态:</div>
            <div>等待测试...</div>
        </div>
        
        <div class="test-box">
            <h2>📱 设备信息</h2>
            <div id="deviceInfo" style="text-align: left; padding: 15px; background: rgba(0,0,0,0.2); border-radius: 8px;">
                检测中...
            </div>
        </div>
    </div>
    
    <script>
        // 直接测试脚本
        console.log('🧪 直接测试页面加载');
        
        // 更新状态
        function updateStatus(message, type = '') {
            const status = document.getElementById('status');
            const timestamp = new Date().toLocaleTimeString();
            const div = document.createElement('div');
            div.className = type;
            div.style.cssText = 'margin: 5px 0; padding: 5px; border-left: 3px solid ' + (type === 'error' ? '#ff6b6b' : '#4ecdc4') + ';';
            div.textContent = `[${timestamp}] ${message}`;
            status.appendChild(div);
            status.scrollTop = status.scrollHeight;
        }
        
        // 更新设备信息
        function updateDeviceInfo() {
            const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent);
            const isiPhone = /iPhone/.test(navigator.userAgent);
            const hasTouch = 'ontouchstart' in window;
            
            document.getElementById('deviceInfo').innerHTML = `
                <div><strong>设备类型:</strong> ${isIOS ? 'iOS' : '非iOS'} ${isiPhone ? '(iPhone)' : ''}</div>
                <div><strong>触摸支持:</strong> ${hasTouch ? '✅ 支持' : '❌ 不支持'}</div>
                <div><strong>屏幕尺寸:</strong> ${window.innerWidth}×${window.innerHeight}</div>
                <div><strong>用户代理:</strong> ${navigator.userAgent.substring(0, 80)}...</div>
            `;
            
            updateStatus(`设备: ${isIOS ? 'iOS' : '非iOS'} ${isiPhone ? '(iPhone)' : ''}`, 'success');
            updateStatus(`触摸: ${hasTouch ? '支持' : '不支持'}`, 'success');
        }
        
        // JavaScript测试按钮
        document.getElementById('jsTestBtn').onclick = function() {
            console.log('✅ JavaScript测试');
            updateStatus('JavaScript按钮点击成功', 'success');
            
            this.textContent = '✅ 测试成功';
            setTimeout(() => {
                this.textContent = '✅ 测试JavaScript';
            }, 1000);
        };
        
        // 音频测试按钮
        document.getElementById('audioTestBtn').onclick = function() {
            console.log('🔊 音频测试');
            updateStatus('音频测试开始', 'success');
            
            this.textContent = '🔊 播放中...';
            this.disabled = true;
            
            try {
                const audio = new Audio();
                audio.src = 'data:audio/wav;base64,UklGRigAAABXQVZFZm10IBIAAAABAAEARKwAAIhYAQACABAAZGF0YQQAAAAAAA==';
                audio.volume = 0.1;
                
                audio.play();
                updateStatus('音频播放调用成功', 'success');
                
                setTimeout(() => {
                    this.textContent = '🔊 测试音频播放';
                    this.disabled = false;
                    updateStatus('音频测试完成', 'success');
                }, 1000);
                
            } catch (error) {
                updateStatus(`音频错误: ${error.name}`, 'error');
                this.textContent = '🔊 测试音频播放';
                this.disabled = false;
            }
        };
        
        // 触摸测试按钮
        document.getElementById('touchTestBtn').onclick = function() {
            console.log('👆 触摸测试');
            updateStatus('触摸测试开始', 'success');
            
            this.textContent = '👆 测试中...';
            this.disabled = true;
            
            // 模拟触摸测试
            setTimeout(() => {
                this.textContent = '👆 测试触摸事件';
                this.disabled = false;
                updateStatus('触摸测试完成', 'success');
            }, 500);
        };
        
        // 页面加载
        window.onload = function() {
            console.log('✅ 直接测试页面加载完成');
            updateStatus('页面加载完成', 'success');
            
            // 更新设备信息
            updateDeviceInfo();
            
            // 确保按钮可点击
            document.querySelectorAll('.test-button').forEach(btn => {
                btn.style.cursor = 'pointer';
            });
            
            // 添加触摸反馈
            if ('ontouchstart' in window) {
                document.querySelectorAll('.test-button').forEach(btn => {
                    btn.addEventListener('touchstart', function() {
                        this.style.opacity = '0.8';
                    }, { passive: true });
                    
                    btn.addEventListener('touchend', function() {
                        this.style.opacity = '';
                    }, { passive: true });
                });
            }
        };
        
        // 错误处理
        window.onerror = function(message) {
            console.error('❌ 错误:', message);
            updateStatus(`错误: ${message}`, 'error');
        };
        
        console.log('✅ 直接测试脚本初始化完成');
    </script>
</body>
</html>
