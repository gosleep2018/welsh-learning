<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>iPhone超极简测试</title>
    <style>
        body {
            font-family: -apple-system, sans-serif;
            background: black;
            color: white;
            margin: 0;
            padding: 20px;
            padding-top: env(safe-area-inset-top);
            padding-bottom: env(safe-area-inset-bottom);
        }
        .test-area {
            max-width: 400px;
            margin: 0 auto;
        }
        h1 {
            color: #ff3b30;
            text-align: center;
            margin-bottom: 30px;
        }
        .word-card {
            background: #1c1c1e;
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 20px;
            border: 1px solid #38383a;
        }
        .word {
            font-size: 32px;
            font-weight: bold;
            text-align: center;
            margin-bottom: 10px;
            color: #34c759;
        }
        .meaning {
            font-size: 18px;
            text-align: center;
            color: #8e8e93;
            margin-bottom: 30px;
        }
        .button {
            display: block;
            width: 100%;
            padding: 20px;
            margin: 10px 0;
            background: #007aff;
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 18px;
            font-weight: bold;
            text-align: center;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
            min-height: 60px;
        }
        .button:active {
            background: #0056cc;
            transform: scale(0.98);
        }
        .button.red {
            background: #ff3b30;
        }
        .button.red:active {
            background: #d70015;
        }
        .button.green {
            background: #34c759;
        }
        .button.green:active {
            background: #248a3d;
        }
        .status {
            margin-top: 20px;
            padding: 15px;
            background: #2c2c2e;
            border-radius: 10px;
            font-family: monospace;
            font-size: 14px;
            color: #8e8e93;
        }
        .status-line {
            margin: 5px 0;
        }
        .success {
            color: #34c759;
        }
        .error {
            color: #ff3b30;
        }
        .warning {
            color: #ffcc00;
        }
    </style>
</head>
<body>
    <div class="test-area">
        <h1>📱 iPhone超极简测试</h1>
        
        <div class="word-card">
            <div class="word" id="currentWord">Os gwelwch yn dda</div>
            <div class="meaning" id="currentMeaning">请 (礼貌用语)</div>
            
            <button class="button" id="pronounceBtn">🔊 发音</button>
            <button class="button green" id="nextBtn">➡️ 下一个单词</button>
            <button class="button red" id="testBtn">🧪 测试所有功能</button>
        </div>
        
        <div class="status" id="status">
            <div class="status-line">等待测试...</div>
        </div>
    </div>

    <script>
        // ========== 超极简JavaScript ==========
        // 完全内联，没有任何外部依赖
        
        console.log('📱 iPhone超极简测试开始');
        
        // 单词数据
        const words = [
            { welsh: "Helo", meaning: "你好" },
            { welsh: "Diolch", meaning: "谢谢" },
            { welsh: "Os gwelwch yn dda", meaning: "请" },
            { welsh: "Bore da", meaning: "早上好" },
            { welsh: "Nos da", meaning: "晚安" }
        ];
        
        let currentIndex = 2; // 从"请"开始
        
        // 更新显示
        function updateDisplay() {
            const word = words[currentIndex];
            document.getElementById('currentWord').textContent = word.welsh;
            document.getElementById('currentMeaning').textContent = word.meaning;
            
            addStatus(`显示单词: ${word.welsh} (${word.meaning})`, 'success');
        }
        
        // 添加状态信息
        function addStatus(message, type = '') {
            const statusDiv = document.getElementById('status');
            const line = document.createElement('div');
            line.className = `status-line ${type}`;
            line.textContent = `[${new Date().toLocaleTimeString()}] ${message}`;
            statusDiv.appendChild(line);
            statusDiv.scrollTop = statusDiv.scrollHeight;
        }
        
        // 1. 发音功能 - 超极简版本
        document.getElementById('pronounceBtn').onclick = function() {
            console.log('🔊 发音按钮点击');
            addStatus('发音按钮点击', 'warning');
            
            // 立即反馈
            this.textContent = '🔊 播放中...';
            this.disabled = true;
            
            // 创建音频 - 使用静音data URL避免网络问题
            const audio = new Audio();
            audio.src = 'data:audio/wav;base64,UklGRigAAABXQVZFZm10IBIAAAABAAEARKwAAIhYAQACABAAZGF0YQQAAAAAAA==';
            audio.volume = 0.1; // 小声
            
            try {
                // 直接播放，不处理Promise
                audio.play();
                addStatus('音频播放调用成功', 'success');
                
                // 模拟播放完成
                setTimeout(() => {
                    this.textContent = '🔊 发音';
                    this.disabled = false;
                    addStatus('发音完成', 'success');
                }, 1000);
                
            } catch (error) {
                addStatus(`播放错误: ${error.name}`, 'error');
                this.textContent = '🔊 发音';
                this.disabled = false;
            }
        };
        
        // 2. 下一个单词功能 - 超极简版本
        document.getElementById('nextBtn').onclick = function() {
            console.log('➡️ 下一个单词点击');
            addStatus('下一个单词按钮点击', 'warning');
            
            // 立即反馈
            this.textContent = '切换中...';
            this.disabled = true;
            
            // 切换到下一个单词
            currentIndex = (currentIndex + 1) % words.length;
            
            // 更新显示
            updateDisplay();
            
            // 恢复按钮
            setTimeout(() => {
                this.textContent = '➡️ 下一个单词';
                this.disabled = false;
                addStatus('切换到下一个单词成功', 'success');
            }, 300);
        };
        
        // 3. 测试所有功能
        document.getElementById('testBtn').onclick = function() {
            console.log('🧪 测试所有功能');
            addStatus('开始测试所有功能...', 'warning');
            
            // 测试1: 发音
            setTimeout(() => {
                document.getElementById('pronounceBtn').click();
            }, 500);
            
            // 测试2: 下一个单词
            setTimeout(() => {
                document.getElementById('nextBtn').click();
            }, 1500);
            
            // 测试3: 再下一个
            setTimeout(() => {
                document.getElementById('nextBtn').click();
            }, 2500);
            
            addStatus('所有测试已启动', 'success');
        };
        
        // 4. 添加触摸事件支持
        if ('ontouchstart' in window) {
            console.log('👆 检测到触摸支持');
            addStatus('触摸支持: 是', 'success');
            
            // 为所有按钮添加触摸事件
            document.querySelectorAll('.button').forEach(btn => {
                // 触摸开始
                btn.addEventListener('touchstart', function(e) {
                    e.preventDefault();
                    this.style.opacity = '0.8';
                }, { passive: false });
                
                // 触摸结束
                btn.addEventListener('touchend', function() {
                    this.style.opacity = '1';
                });
            });
        } else {
            addStatus('触摸支持: 否', 'warning');
        }
        
        // 5. 页面加载完成
        window.onload = function() {
            console.log('📱 页面加载完成');
            addStatus('页面加载完成', 'success');
            
            // 显示设备信息
            const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent);
            addStatus(`设备: ${isIOS ? 'iOS' : '非iOS'}`, 'info');
            addStatus(`屏幕: ${window.innerWidth}×${window.innerHeight}`, 'info');
            addStatus(`用户代理: ${navigator.userAgent.substring(0, 50)}...`, 'info');
            
            // 初始显示
            updateDisplay();
            
            // 确保所有按钮可点击
            document.querySelectorAll('.button').forEach(btn => {
                btn.style.cursor = 'pointer';
            });
        };
        
        // 6. 错误处理
        window.onerror = function(message, source, lineno, colno, error) {
            console.error('❌ 全局错误:', error);
            addStatus(`错误: ${message}`, 'error');
            return true;
        };
        
        // 初始状态
        addStatus('超极简测试准备就绪', 'success');
        
    </script>
</body>
</html>
